<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - HSG AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="styles.css?v=6">
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .history-card {
      padding: 20px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .history-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-5px);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .history-model {
      font-weight: 600;
      color: var(--primary-light);
      text-transform: capitalize;
    }
    .history-date {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .history-snippet {
      font-size: 0.95rem;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .back-nav {
      margin-top: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="dashboard-body">
  <div id="auth-toast" class="auth-toast" style="display: none;"></div>

  <nav class="nav">
    <div class="nav-brand">
      <img src="logos/ai-hubs-logo.svg" alt="HSG AI HUB Logo" class="brand-logo">
      <span class="brand-text">HSG AI HUB</span>
    </div>
    <div class="nav-actions">
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="back-nav">
      <a href="index.html" class="btn-secondary" style="display: inline-flex; align-items: center; gap: 8px; text-decoration: none;"><i class="ph ph-arrow-left"></i> Back to AI Tools</a>
    </div>

    <div class="glass" style="padding: 30px; border-radius: 16px;">
      <h2><i class="ph ph-clock-counter-clockwise"></i> Your Chat History</h2>
      <p style="color: var(--text-secondary); margin-top: 10px;">Review your past conversations with AI models.</p>
      
      <div id="history-grid" class="history-grid">
        <div style="text-align: center; grid-column: 1 / -1; padding: 40px; color: var(--text-secondary);">
          <div class="hsg-spinner" style="margin: 0 auto 15px auto;"></div>
          Loading your history...
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js?v=6"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await fetch('/api/chat/history/all', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const data = await response.json();
        const grid = document.getElementById('history-grid');
        
        if (!response.ok) {
          grid.innerHTML = `<div style="grid-column: 1/-1; color: #ef4444;">Failed to load history.</div>`;
          return;
        }

        if (data.chats.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">You haven't started any chats yet!</div>`;
          return;
        }

        grid.innerHTML = data.chats.map(chat => {
          const lastMsg = chat.messages[chat.messages.length - 1];
          const snippet = lastMsg ? lastMsg.text : 'Empty conversation';
          const date = new Date(chat.updatedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
          
          return `
            <div class="history-card glass" onclick="window.location.href='index.html?tool=${chat.toolId}'">
              <div class="history-header">
                <span class="history-model"><i class="ph ph-robot"></i> ${chat.toolId}</span>
                <span class="history-date">${date}</span>
              </div>
              <div class="history-snippet">${snippet}</div>
              <div style="font-size: 0.8rem; color: var(--primary); margin-top: auto;">${chat.messages.length} messages <i class="ph ph-arrow-right"></i></div>
            </div>
          `;
        }).join('');

      } catch (err) {
        document.getElementById('history-grid').innerHTML = `<div style="grid-column: 1/-1; color: #ef4444;">Connection error.</div>`;
      }
    });

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
