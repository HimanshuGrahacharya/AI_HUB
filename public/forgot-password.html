<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your HSG AI HUB password">
  <title>Forgot Password - HSG AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      background: #0a0a1a;
      color: #e2e8f0;
    }

    /* ── Left panel ── */
    .auth-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 5%;
      background: radial-gradient(ellipse 80% 70% at 50% 30%, rgba(99,102,241,0.35) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(168,85,247,0.2) 0%, transparent 60%),
                  #0a0a1a;
      position: relative;
      overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(99,102,241,0.12) 1px, transparent 0);
      background-size: 36px 36px;
    }
    .auth-left-content { position: relative; z-index: 1; text-align: center; max-width: 420px; }
    .auth-left-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:48px; }
    .auth-left-logo img { width:44px; height:44px; }
    .auth-left-logo span { font-family:'Outfit',sans-serif; font-weight:800; font-size:1.6rem; color:#fff; }
    .auth-left h2 { font-family:'Outfit',sans-serif; font-weight:800; font-size:clamp(1.8rem,3vw,2.4rem); color:#fff; line-height:1.15; margin-bottom:16px; }
    .auth-left h2 span { background:linear-gradient(135deg,#818cf8,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .auth-left p { color:rgba(226,232,240,0.65); font-size:1rem; line-height:1.7; margin-bottom:40px; }

    /* ── Right panel (form) ── */
    .auth-right {
      width: 480px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      background: #0d0d20;
      border-left: 1px solid rgba(255,255,255,0.07);
    }
    .auth-form-wrap { width: 100%; max-width: 380px; }
    .auth-form-wrap h1 { font-family:'Outfit',sans-serif; font-weight:800; font-size:1.9rem; color:#fff; margin-bottom:6px; }
    .auth-form-wrap .auth-sub { color:rgba(226,232,240,0.55); font-size:.9rem; margin-bottom:32px; line-height: 1.5; }

    .form-group { margin-bottom:24px; }
    .form-group label { display:block; font-size:.82rem; font-weight:600; color:rgba(226,232,240,0.7); margin-bottom:7px; letter-spacing:.03em; text-transform:uppercase; }
    .input-wrap { position:relative; display:flex; align-items:center; }
    .input-wrap .input-icon { position:absolute; left:14px; color:rgba(255,255,255,0.3); font-size:1.1rem; pointer-events:none; z-index:1; }
    .input-wrap input {
      width:100%; padding:13px 14px 13px 42px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; color:#fff; font-size:.95rem; font-family:'Inter',sans-serif;
      outline:none; transition:all .25s;
    }
    .input-wrap input::placeholder { color:rgba(255,255,255,0.25); }
    .input-wrap input:focus { border-color:rgba(99,102,241,0.6); background:rgba(99,102,241,0.06); box-shadow:0 0 0 3px rgba(99,102,241,0.12); }
    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:hover, 
    .input-wrap input:-webkit-autofill:focus, 
    .input-wrap input:-webkit-autofill:active{
      -webkit-box-shadow: 0 0 0 30px #0d0d20 inset !important;
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .btn-submit {
      width:100%; padding:14px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; border:none; border-radius:12px;
      font-family:'Outfit',sans-serif; font-weight:700; font-size:1rem;
      cursor:pointer; transition:all .3s; letter-spacing:.02em;
      box-shadow:0 6px 24px rgba(99,102,241,0.35);
      margin-bottom: 24px;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(99,102,241,0.5); }
    .btn-submit:active { transform:translateY(0); }

    .auth-switch { text-align:center; font-size:.9rem; color:rgba(226,232,240,0.5); }
    .auth-switch a { color:#818cf8; font-weight:600; text-decoration:none; }
    .auth-switch a:hover { text-decoration:underline; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .auth-left { display:none; }
      .auth-right { width:100%; border-left:none; padding:40px 24px; }
    }
    @media (max-width: 480px) {
      .auth-right { padding:32px 16px; }
    }
  </style>
</head>
<body>

  <!-- Left decorative panel -->
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-logo">
        <img src="logos/ai-hubs-logo.svg" alt="HSG AI HUB">
        <span>HSG AI HUB</span>
      </div>
      <h2>Get Back Into<br><span>HSG AI HUB</span></h2>
      <p>Securely reset your password and regain access to your personal AI toolkit.</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-right">
    <div class="auth-form-wrap">
      <h1 id="wizard-title">Forgot Password</h1>
      <p class="auth-sub" id="wizard-desc">Enter your email or mobile number to receive a 6-digit verification code.</p>

      <form id="forgot-password-form" autocomplete="off">
        
        <!-- STEP 1: Send OTP -->
        <div id="step-1">
          <div class="form-group">
            <label for="identifier">Email Address or Mobile Number</label>
            <div class="input-wrap">
              <i class="ph ph-user input-icon"></i>
              <input type="text" id="identifier" name="identifier" placeholder="you@example.com or +1234567890" required>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="send-otp-btn">Send Verification Code</button>
        </div>

        <!-- STEP 2: Verify OTP -->
        <div id="step-2" style="display: none;">
          <div class="form-group">
            <label for="otp">Enter 6-Digit Code</label>
            <div class="input-wrap">
              <i class="ph ph-key input-icon"></i>
              <input type="text" id="otp" name="otp" placeholder="123456" maxlength="6" pattern="\d{6}">
            </div>
            <p style="font-size: 0.85rem; color: #818cf8; margin-top: 10px; cursor: pointer; text-align: right;" id="resend-otp-link">Resend Code</p>
          </div>
          <button type="button" class="btn-submit" id="verify-otp-btn">Verify Code</button>
        </div>

        <!-- STEP 3: New Password -->
        <div id="step-3" style="display: none;">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrap">
              <i class="ph ph-lock input-icon"></i>
              <input type="password" id="newPassword" name="newPassword" placeholder="Minimum 8 characters">
              <i class="ph ph-eye toggle-pw" id="toggle-pw" onclick="togglePassword('newPassword','toggle-pw')" style="position:absolute; right:14px; color:rgba(255,255,255,0.3); cursor:pointer; font-size:1.1rem; transition:color .2s; z-index:1;"></i>
            </div>
          </div>
          <button type="button" class="btn-submit" id="reset-pw-btn">Update Password</button>
        </div>

      </form>

      <p class="auth-switch">Remembered your password? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="auth.js?v=5"></script>
  <script>
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ph ph-eye-slash toggle-pw';
      } else {
        input.type = 'password';
        icon.className = 'ph ph-eye toggle-pw';
      }
    }
  </script>
</body>
</html>
